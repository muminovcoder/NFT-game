<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NFT Card Collection Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #fff;
            margin: 0;
            font-size: 1.2rem;
        }

        .sidebar-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .sidebar-menu {
            padding: 10px 0;
        }

        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu .menu-item:hover,
        .sidebar-menu .menu-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-left-color: #3b82f6;
        }

        .sidebar-menu .menu-item .menu-icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Menu Toggle Button */
        .menu-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            margin-right: 10px;
        }

        /* Bot Connection Status */
        .bot-status {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }

        .bot-status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            margin-top: 10px;
        }

        .bot-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .bot-status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 260px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>🎮 NFT Game</h3>
                <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
            </div>
            
            <nav class="sidebar-menu">
                <a href="https://nft-game-1-1ryd.onrender.com" class="menu-item active">
                    <span class="menu-icon">🏠</span>
                    <span>Bosh sahifa</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('dashboard'); toggleSidebar(); return false;">
                    <span class="menu-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('packs'); toggleSidebar(); return false;">
                    <span class="menu-icon">📦</span>
                    <span>Packs</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('battle'); toggleSidebar(); return false;">
                    <span class="menu-icon">⚔️</span>
                    <span>Battle</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('collection'); toggleSidebar(); return false;">
                    <span class="menu-icon">🃏</span>
                    <span>Collection</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('marketplace'); toggleSidebar(); return false;">
                    <span class="menu-icon">🛒</span>
                    <span>Market</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('bonus'); toggleSidebar(); return false;">
                    <span class="menu-icon">🎁</span>
                    <span>Daily Bonus</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('referral'); toggleSidebar(); return false;">
                    <span class="menu-icon">👥</span>
                    <span>Referral</span>
                </a>
                <a href="#" class="menu-item" onclick="App.navigateTo('withdraw'); toggleSidebar(); return false;">
                    <span class="menu-icon">💰</span>
                    <span>Withdraw</span>
                </a>
                <a href="#" class="menu-item" onclick="Admin.showAdminLogin(); toggleSidebar(); return false;">
                    <span class="menu-icon">🔐</span>
                    <span>Admin Panel</span>
                </a>
                
                <!-- Bot Connection Status -->
                <div class="bot-status">
                    <div style="color: #94a3b8; font-size: 0.9rem;">Telegram Bot</div>
                    <div class="bot-status-indicator">
                        <div class="bot-status-dot" id="botStatusDot"></div>
                        <span id="botStatusText" style="color: #fff; font-size: 0.85rem;">Connected</span>
                    </div>
                    <a href="https://t.me/your_bot_username" target="_blank" class="menu-item" style="margin-top: 10px; padding: 10px 15px; background: rgba(59, 130, 246, 0.2); border-radius: 8px;">
                        <span class="menu-icon">🤖</span>
                        <span>Open Bot</span>
                    </a>
                </div>
            </nav>
        </aside>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <div class="toast hidden" id="toast">
            <span id="toastMessage"></span>
        </div>

        <div class="modal hidden" id="modal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <div id="modalContent"></div>
            </div>
        </div>

        <header class="header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div class="user-avatar" id="userAvatar">
                <span>U</span>
            </div>
            <div class="user-info">
                <span class="username" id="username">Loading...</span>
                <span class="user-id" id="userId">ID: -</span>
            </div>
            <div class="coins-display">
                <span class="coin-icon">🪙</span>
                <span class="coin-balance" id="coinBalance">0</span>
            </div>
        </header>

        <div class="card-stats" id="cardStats">
            <div class="stat-item">
                <span class="stat-value rarity-common">0</span>
                <span class="stat-label">Common</span>
            </div>
            <div class="stat-item">
                <span class="stat-value rarity-rare">0</span>
                <span class="stat-label">Rare</span>
            </div>
            <div class="stat-item">
                <span class="stat-value rarity-epic">0</span>
                <span class="stat-label">Epic</span>
            </div>
            <div class="stat-item">
                <span class="stat-value rarity-legendary">0</span>
                <span class="stat-label">Legendary</span>
            </div>
        </div>

        <main class="main-content" id="mainContent">
        </main>

        <nav class="nav-bar">
            <button class="nav-btn active" data-view="dashboard">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </button>
            <button class="nav-btn" data-view="packs">
                <span class="nav-icon">📦</span>
                <span>Packs</span>
            </button>
            <button class="nav-btn" data-view="battle">
                <span class="nav-icon">⚔️</span>
                <span>Battle</span>
            </button>
            <button class="nav-btn" data-view="collection">
                <span class="nav-icon">🃏</span>
                <span>Cards</span>
            </button>
            <button class="nav-btn" data-view="marketplace">
                <span class="nav-icon">🛒</span>
                <span>Market</span>
            </button>
        </nav>
    </div>

    <script src="mock-api.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="packs.js"></script>
    <script src="collection.js"></script>
    <script src="battle.js"></script>
    <script src="marketplace.js"></script>
    <script src="bonus.js"></script>
    <script src="referral.js"></script>
    <script src="withdraw.js"></script>
    <script src="admin.js"></script>

    <script>
        // ==================== GLOBAL CONFIG ====================
        const SITE_URL = 'https://nft-game-1-1ryd.onrender.com';
        const BOT_USERNAME = 'your_bot_username'; // Telegram bot username (masalan: NFTGameBot)
        const BOT_WEBHOOK_URL = `${SITE_URL}/webhook`;
        
        // ==================== SIDEBAR FUNCTIONS ====================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const menuToggle = document.querySelector('.menu-toggle');
            
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target) && sidebar.classList.contains('active')) {
                toggleSidebar();
            }
        });

        // ==================== BOT INTEGRATION ====================
        class BotIntegration {
            constructor() {
                this.isConnected = false;
                this.userId = null;
                this.init();
            }

            async init() {
                await this.checkConnection();
                this.startHeartbeat();
            }

            async checkConnection() {
                try {
                    // Simulate bot connection check
                    const savedBotId = localStorage.getItem('telegramBotId');
                    if (savedBotId) {
                        this.userId = savedBotId;
                        this.isConnected = true;
                        this.updateBotStatus(true);
                    } else {
                        this.isConnected = false;
                        this.updateBotStatus(false);
                    }
                } catch (error) {
                    console.error('Bot connection check failed:', error);
                    this.isConnected = false;
                    this.updateBotStatus(false);
                }
            }

            updateBotStatus(connected) {
                const dot = document.getElementById('botStatusDot');
                const text = document.getElementById('botStatusText');
                
                if (connected) {
                    dot.classList.remove('disconnected');
                    text.textContent = 'Connected';
                    text.style.color = '#22c55e';
                } else {
                    dot.classList.add('disconnected');
                    text.textContent = 'Disconnected';
                    text.style.color = '#ef4444';
                }
            }

            async connectBot() {
                // This would normally open Telegram and get user ID
                const telegramUrl = `https://t.me/${BOT_USERNAME}?start=${MockAPI.user.id}`;
                window.open(telegramUrl, '_blank');
                
                // Save connection after user opens bot
                setTimeout(() => {
                    localStorage.setItem('telegramBotId', MockAPI.user.id);
                    this.isConnected = true;
                    this.updateBotStatus(true);
                    App.showToast('Bot connected successfully!', 'success');
                }, 3000);
            }

            async sendToBot(message, type = 'notification') {
                if (!this.isConnected) {
                    console.warn('Bot not connected');
                    return false;
                }

                try {
                    // In real implementation, this would call your backend
                    console.log(`[BOT] Sending to ${this.userId}: ${message}`);
                    
                    // Simulate API call
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    return true;
                } catch (error) {
                    console.error('Failed to send to bot:', error);
                    return false;
                }
            }

            startHeartbeat() {
                // Check connection every 30 seconds
                setInterval(() => {
                    this.checkConnection();
                }, 30000);
            }

            // Send notification when withdrawal is approved/rejected
            async sendWithdrawalNotification(status, amount, userId) {
                const message = status === 'approved' 
                    ? `✅ Withdrawal Approved! ${amount} so'm has been sent to your card.`
                    : `❌ Withdrawal Rejected. ${amount} coins returned to your balance.`;
                
                await this.sendToBot(message, 'withdrawal');
            }
        }

        // Initialize Bot Integration
        const bot = new BotIntegration();

        // ==================== APP EXTENSIONS ====================
        MockAPI.init();
        
        App.renderView = function(view) {
            const views = {
                dashboard: () => {
                    this.elements.mainContent.innerHTML = `
                        <div class="dashboard">
                            <section class="hero-section">
                                <div class="hero-content">
                                    <h1 class="game-title">
                                        <span class="title-glow">NFT Cards</span>
                                        <span class="title-sub">Collection Game</span>
                                    </h1>
                                    <div class="quick-stats">
                                        <div class="quick-stat">
                                            <span>🃏</span>
                                            <span>${this.state.user?.totalCards || 0} Cards</span>
                                        </div>
                                        <div class="quick-stat">
                                            <span>⚔️</span>
                                            <span>Battle & Win</span>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section class="quick-actions">
                                <button class="action-card ripple" data-view="packs">
                                    <div class="action-icon">📦</div>
                                    <span>Open Pack</span>
                                </button>
                                <button class="action-card ripple" data-view="battle">
                                    <div class="action-icon">⚔️</div>
                                    <span>Battle</span>
                                </button>
                                <button class="action-card ripple" data-view="collection">
                                    <div class="action-icon">🃏</div>
                                    <span>Collection</span>
                                </button>
                                <button class="action-card ripple" data-view="marketplace">
                                    <div class="action-icon">🛒</div>
                                    <span>Market</span>
                                </button>
                            </section>

                            <section class="features-grid">
                                <button class="feature-card ripple" data-view="bonus">
                                    <div class="feature-icon daily-icon">
                                        <span>🎁</span>
                                    </div>
                                    <div class="feature-info">
                                        <h3>Daily Bonus</h3>
                                        <p>Claim free coins</p>
                                    </div>
                                    <span class="icon-arrow">›</span>
                                </button>
                                <button class="feature-card ripple" data-view="referral">
                                    <div class="feature-icon ref-icon">
                                        <span>👥</span>
                                    </div>
                                    <div class="feature-info">
                                        <h3>Referral</h3>
                                        <p>Invite & earn</p>
                                    </div>
                                    <span class="icon-arrow">›</span>
                                </button>
                                <button class="feature-card ripple" data-view="withdraw">
                                    <div class="feature-icon withdraw-icon">
                                        <span>💰</span>
                                    </div>
                                    <div class="feature-info">
                                        <h3>Withdraw</h3>
                                        <p>Convert to UZS</p>
                                    </div>
                                    <span class="icon-arrow">›</span>
                                </button>
                                <button class="feature-card ripple" onclick="Admin.showAdminLogin(); return false;">
                                    <div class="feature-icon" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                                        <span>🔐</span>
                                    </div>
                                    <div class="feature-info">
                                        <h3>Admin</h3>
                                        <p>Manage withdrawals</p>
                                    </div>
                                    <span class="icon-arrow">›</span>
                                </button>
                            </section>

                            <section class="recent-cards">
                                <h2 class="section-title">Your Recent Cards</h2>
                                <div class="recent-cards-grid" id="recentCardsGrid">
                                    ${this.renderRecentCards()}
                                </div>
                            </section>
                        </div>
                    `;

                    this.elements.mainContent.querySelectorAll('[data-view]').forEach(btn => {
                        btn.addEventListener('click', () => this.navigateTo(btn.dataset.view));
                    });
                },

                packs: () => Packs.render(),
                collection: () => Collection.render(),
                battle: () => Battle.render(),
                marketplace: () => Marketplace.render(),
                bonus: () => Bonus.render(),
                referral: () => Referral.render(),
                withdraw: () => Withdraw.render()
            };

            if (views[view]) {
                views[view].call(this);
            }
        };

        App.renderRecentCards = function() {
            const userCards = MockAPI.cards.filter(c => c.ownerId === MockAPI.user.id).slice(-6).reverse();
            if (userCards.length === 0) {
                return '<p class="empty-message">No cards yet. Open a pack to get started!</p>';
            }
            
            return userCards.map(card => {
                const rarityClass = `rarity-${card.rarity}`;
                const glowClass = card.rarity === 'legendary' || card.rarity === 'epic' ? 'card-glow' : '';
                const emojis = { common: '🛡️', rare: '🐉', epic: '🔥', legendary: '👑' };
                
                return `
                    <div class="card ${rarityClass} ${glowClass} card-small" 
                         data-card-id="${card.id}" 
                         onclick="App.showCardDetail('${card.id}')">
                        <div class="card-image">
                            <div class="card-avatar ${rarityClass}">
                                ${emojis[card.rarity] || '🃏'}
                            </div>
                        </div>
                        <h4 class="card-name">${card.name}</h4>
                        <div class="card-stats-row">
                            <span class="power-badge">⚡${card.power}</span>
                        </div>
                    </div>
                `;
            }).join('');
        };

        App.showCardDetail = function(cardId) {
            const card = MockAPI.cards.find(c => c.id === cardId);
            if (!card) return;

            const isOwner = card.ownerId === MockAPI.user.id;
            const rarityClass = `rarity-${card.rarity}`;
            const emojis = { common: '🛡️', rare: '🐉', epic: '🔥', legendary: '👑' };
            const descriptions = {
                common: 'A standard card with basic capabilities. Every collector starts here!',
                rare: 'An enhanced card with superior stats. Great addition to any deck!',
                epic: 'A powerful card featuring unique abilities. Highly sought after!',
                legendary: 'THE RAREST card in existence! Features ultimate power and abilities!'
            };
            
            const content = `
                <div class="card-detail ${rarityClass} ${card.rarity === 'legendary' || card.rarity === 'epic' ? 'card-glow' : ''}">
                    <div class="detail-card-wrapper">
                        <div class="detail-card ${rarityClass}">
                            <div class="detail-card-avatar ${rarityClass}">
                                ${emojis[card.rarity] || '🃏'}
                            </div>
                            <div class="detail-card-badge ${rarityClass}">${card.rarity.toUpperCase()}</div>
                        </div>
                    </div>
                    <h2 class="detail-card-name">${card.name}</h2>
                    <p class="detail-card-desc">${descriptions[card.rarity] || ''}</p>
                    
                    <div class="detail-stats">
                        <div class="detail-stat">
                            <span class="detail-stat-label">Power</span>
                            <span class="detail-stat-value">⚡ ${card.power}</span>
                        </div>
                        <div class="detail-stat">
                            <span class="detail-stat-label">Speed</span>
                            <span class="detail-stat-value">💨 ${card.speed}</span>
                        </div>
                        <div class="detail-stat">
                            <span class="detail-stat-label">Defense</span>
                            <span class="detail-stat-value">🛡️ ${card.defense}</span>
                        </div>
                        <div class="detail-stat">
                            <span class="detail-stat-label">Ability</span>
                            <span class="detail-stat-value">✨ ${card.specialAbility}</span>
                        </div>
                    </div>

                    ${isOwner ? `
                        <div class="detail-actions">
                            ${!card.isForSale ? `
                                <button class="btn btn-primary ripple" onclick="App.listCardForSale('${card.id}')">
                                    💰 List for Sale
                                </button>
                            ` : `
                                <button class="btn btn-danger ripple" onclick="App.cancelCardSale('${card.id}')">
                                    ✖️ Cancel Sale
                                </button>
                                <div class="sale-info">Listed for ${card.salePrice?.toLocaleString()} coins</div>
                            `}
                        </div>
                    ` : ''}
                </div>
            `;

            this.showModal(content);
        };

        App.getCardEmoji = function(rarity) {
            const emojis = { common: '🛡️', rare: '🐉', epic: '🔥', legendary: '👑' };
            return emojis[rarity] || '🃏';
        };

        App.listCardForSale = async function(cardId) {
            const price = prompt('Enter sale price (coins):');
            if (!price || isNaN(price) || parseInt(price) <= 0) {
                this.showToast('Invalid price', 'error');
                return;
            }

            try {
                this.setLoading(true);
                await API.listCard(cardId, parseInt(price));
                this.showToast('Card listed for sale!', 'success');
                this.closeModal();
                await this.refreshUser();
            } catch (error) {
                this.showToast(error.message || 'Failed to list card', 'error');
            } finally {
                this.setLoading(false);
            }
        };

        App.cancelCardSale = async function(cardId) {
            try {
                this.setLoading(true);
                await API.cancelListing(cardId);
                this.showToast('Sale cancelled', 'success');
                this.closeModal();
                await this.refreshUser();
            } catch (error) {
                this.showToast(error.message || 'Failed to cancel sale', 'error');
            } finally {
                this.setLoading(false);
            }
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
            
            // Check bot connection status
            setTimeout(() => {
                bot.checkConnection();
            }, 1000);
        });

        window.telegramReady = true;
        window.SITE_URL = SITE_URL;
        window.bot = bot;
    </script>
</body>
</html>
