<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NFT Card Collection Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .sidebar.active { left: 0; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            color: #fff;
            margin: 0;
            font-size: 1.2rem;
        }

        .sidebar-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .sidebar-menu { padding: 10px 0; }

        .sidebar-menu .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu .menu-item:hover,
        .sidebar-menu .menu-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-left-color: #3b82f6;
        }

        .sidebar-menu .menu-item .menu-icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active { display: block; }

        .menu-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            margin-right: 10px;
        }

        .bot-status {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }

        .bot-status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            margin-top: 10px;
        }

        .bot-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .bot-status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 260px; }
        }

        /* Basic Styles for App */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #fff;
            overflow-x: hidden;
        }

        #app { min-height: 100vh; }

        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .user-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .username { font-weight: 600; font-size: 0.95rem; }
        .user-id { font-size: 0.75rem; color: #94a3b8; }

        .coins-display {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(59, 130, 246, 0.2);
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
        }

        .card-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.5);
        }

        .stat-item {
            text-align: center;
            padding: 8px 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .stat-value { display: block; font-weight: 700; font-size: 1.1rem; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; }

        .rarity-common { color: #94a3b8; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f59e0b; }

        .main-content { padding: 16px; padding-bottom: 80px; }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            background: rgba(30, 41, 59, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.active, .nav-btn:hover {
            color: #fff;
            background: rgba(59, 130, 246, 0.2);
        }

        .nav-icon { font-size: 1.3rem; }
        .nav-btn span:last-child { font-size: 0.7rem; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .loading-overlay.hidden { display: none; }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 3000;
            animation: slideDown 0.3s ease;
        }
        .toast.hidden { display: none; }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            padding: 20px;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Dashboard Styles */
        .hero-section {
            text-align: center;
            padding: 24px 16px;
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .game-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 8px;
        }
        .title-glow {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-sub {
            display: block;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }
        .quick-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }
        .quick-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .action-card {
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-card:hover {
            background: rgba(59,130,246,0.15);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .action-icon { font-size: 1.8rem; }
        .action-card span:last-child { font-size: 0.85rem; font-weight: 500; }

        .features-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }
        .feature-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .feature-card:hover {
            background: rgba(59,130,246,0.1);
            border-color: #3b82f6;
        }
        .feature-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }
        .feature-icon.daily-icon { background: linear-gradient(135deg, #22c55e, #10b981); }
        .feature-icon.ref-icon { background: linear-gradient(135deg, #f59e0b, #eab308); }
        .feature-icon.withdraw-icon { background: linear-gradient(135deg, #8b5cf6, #a855f7); }
        .feature-info { flex: 1; }
        .feature-info h3 { margin: 0 0 4px; font-size: 1rem; }
        .feature-info p { margin: 0; font-size: 0.8rem; color: #94a3b8; }
        .icon-arrow { font-size: 1.2rem; color: #64748b; }

        .section-title {
            font-size: 1.2rem;
            margin: 0 0 14px;
            font-weight: 600;
        }
        .recent-cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .card {
            background: rgba(30,41,59,0.9);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-3px); }
        .card.card-glow {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
            to { box-shadow: 0 0 25px rgba(245, 158, 11, 0.6); }
        }
        .card.rarity-common { border-color: #94a3b8; }
        .card.rarity-rare { border-color: #3b82f6; }
        .card.rarity-epic { border-color: #a855f7; }
        .card.rarity-legendary { border-color: #f59e0b; }
        
        .card-image {
            width: 60px; height: 60px;
            margin: 0 auto 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-avatar {
            font-size: 1.8rem;
        }
        .card-name {
            font-size: 0.8rem;
            margin: 0 0 6px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-stats-row { display: flex; justify-content: center; }
        .power-badge {
            font-size: 0.75rem;
            background: rgba(59,130,246,0.2);
            padding: 3px 8px;
            border-radius: 10px;
        }
        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            color: #94a3b8;
            padding: 20px;
            font-size: 0.9rem;
        }

        /* Card Detail Modal */
        .card-detail { text-align: center; }
        .detail-card-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .detail-card {
            width: 140px; height: 180px;
            border-radius: 16px;
            background: rgba(30,41,59,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 3px solid;
        }
        .detail-card.rarity-common { border-color: #94a3b8; }
        .detail-card.rarity-rare { border-color: #3b82f6; }
        .detail-card.rarity-epic { border-color: #a855f7; }
        .detail-card.rarity-legendary { border-color: #f59e0b; }
        
        .detail-card-avatar {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .detail-card-badge {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
        }
        .detail-card-name {
            font-size: 1.3rem;
            margin: 0 0 8px;
            font-weight: 700;
        }
        .detail-card-desc {
            font-size: 0.9rem;
            color: #94a3b8;
            margin: 0 0 20px;
            line-height: 1.4;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .detail-stat {
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 10px;
        }
        .detail-stat-label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .detail-stat-value {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .detail-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        .sale-info {
            font-size: 0.85rem;
            color: #22c55e;
            text-align: center;
        }
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }
        .ripple:active::after {
            width: 300px; height: 300px;
            opacity: 0;
        }
    </style>
</head>
<body>

    <script>
        // ==================== GLOBAL CONFIG ====================
        const SITE_URL = 'https://nft-game-1-1ryd.onrender.com';
        const BOT_USERNAME = 'kmuminov_testbot';
        const BOT_USER_ID = '8527765725'; // Fixed user ID
        const BOT_WEBHOOK_URL = `${SITE_URL}/webhook`;
        
        // ==================== MOCK API ====================
        const MockAPI = {
            user: {
                id: BOT_USER_ID,
                username: 'Player_' + BOT_USER_ID.slice(-4),
                coins: 1500,
                totalCards: 0,
                cardsByRarity: { common: 0, rare: 0, epic: 0, legendary: 0 }

        // ==================== BOT INTEGRATION CLASS ====================
        class BotIntegration {
            constructor() {
                this.isConnected = false;
                this.userId = BOT_USER_ID;
                this.botUsername = BOT_USERNAME;
            }

            async init() {
                await this.checkConnection();
                this.startHeartbeat();
            }

            async checkConnection() {
                try {
                    // Check Telegram WebApp availability
                    if (window.Telegram?.WebApp) {
                        const tg = window.Telegram.WebApp;
                        tg.ready();
                        tg.expand();
                        
                        // Get user data from Telegram
                        const tgUser = tg.initDataUnsafe?.user;
                        if (tgUser?.id) {
                            this.userId = String(tgUser.id);
                            this.isConnected = true;
                            localStorage.setItem('botUserId', this.userId);
                            this.updateBotStatus(true);
                            return;
                        }
                    }
                    
                    // Fallback to localStorage
                    const savedId = localStorage.getItem('botUserId');
                    if (savedId === BOT_USER_ID) {
                        this.isConnected = true;
                        this.updateBotStatus(true);
                    } else {
                        this.isConnected = false;
                        this.updateBotStatus(false);
                    }
                } catch (error) {
                    console.error('Bot connection check failed:', error);
                    this.isConnected = false;
                    this.updateBotStatus(false);
                }
            }

            updateBotStatus(connected) {
                const dot = document.getElementById('botStatusDot');
                const text = document.getElementById('botStatusText');
                if (connected) {
                    dot.classList.remove('disconnected');
                    text.textContent = 'Connected to @' + this.botUsername;
                    text.style.color = '#22c55e';
                } else {
                    dot.classList.add('disconnected');
                    text.textContent = 'Disconnected';
                    text.style.color = '#ef4444';
                }
            }

            async connectBot() {
                const startParam = `game_${MockAPI.user.id}_${Date.now()}`;
                const telegramUrl = `https://t.me/${this.botUsername}?start=${startParam}`;
                
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.openLink(telegramUrl);
                } else {
                    window.open(telegramUrl, '_blank');
                }
                
                // Simulate connection after user interacts with bot
                setTimeout(() => {
                    localStorage.setItem('botUserId', BOT_USER_ID);
                    this.isConnected = true;
                    this.updateBotStatus(true);
                    App.showToast('✅ Connected to @' + this.botUsername, 'success');
                }, 2500);
            }

            async sendToBot(message, type = 'notification') {
                if (!this.isConnected) {
                    App.showToast('⚠️ Bot not connected', 'error');
                    return false;
                }
                try {
                    console.log(`[BOT @${this.botUsername}] Sending to ${this.userId}: [${type}] ${message}`);
                    
                    // Simulate API call to backend
                    await new Promise(resolve => setTimeout(resolve, 400));
                    
                    // If backend exists, send webhook:
                    // await fetch(BOT_WEBHOOK_URL, {
                    //     method: 'POST',
                    //     headers: {'Content-Type': 'application/json'},
                    //     body: JSON.stringify({ userId: this.userId, message, type })
                    // });
                    
                    return true;
                } catch (error) {
                    console.error('Failed to send to bot:', error);
                    return false;
                }
            }

            startHeartbeat() {
                setInterval(() => this.checkConnection(), 30000);
            }

            async sendWithdrawalNotification(status, amount, currency = "so'm") {
                const message = status === 'approved' 
                    ? `✅ Withdrawal Approved!\n${amount.toLocaleString()} ${currency} sent to your card.`
                    : `❌ Withdrawal Rejected.\n${amount.toLocaleString()} coins returned to balance.`;
                await this.sendToBot(message, 'withdrawal');
            }
        }

        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            initTelegramWebApp();
            App.init();
            
            // Expose globals for debugging
            window.App = App;
            window.bot = App.bot;
            window.BOT_USERNAME = BOT_USERNAME;
            window.BOT_USER_ID = BOT_USER_ID;
            
            console.log('🚀 NFT Game Loaded');
            console.log('🤖 Bot: @' + BOT_USERNAME);
            console.log('👤 User ID: ' + BOT_USER_ID);
        });

        // Telegram WebApp script (if loaded from Telegram)
        if (document.currentScript?.src?.includes('telegram-web-app.js') || window.Telegram?.WebApp) {
            window.telegramReady = true;
        }
    </script>
    
    <!-- Telegram WebApp JS (optional - loads only in Telegram) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
